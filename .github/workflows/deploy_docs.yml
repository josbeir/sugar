name: Deploy docs

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/assets/**'
      - 'docs/content/**'
      - 'docs/static/**'
      - 'docs/templates/**'
      - 'docs/glaze.neon'
      - 'docs/package.json'
      - 'docs/package-lock.json'
      - 'docs/vite.config.js'
      - '.github/workflows/deploy_docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: intl, fileinfo

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install Glaze via Composer
        run: |
          composer init --name josbeir/sugar-docs --no-interaction
          composer require josbeir/glaze:dev-main --prefer-dist --no-interaction --no-progress
        working-directory: docs

      - name: Install npm dependencies
        run: npm ci
        working-directory: docs

      - name: Build site with Glaze
        run: vendor/bin/glaze build -v
        working-directory: docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
